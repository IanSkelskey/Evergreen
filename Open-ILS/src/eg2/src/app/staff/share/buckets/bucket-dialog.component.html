<eg-string #successString i18n-text text="Successfully added to bucket">
</eg-string>

<ng-template #dialogContent>
  <div class="modal-header">
    <div>
      <h4 class="modal-title mb-1">{{bucketDialogTitle}}</h4>
      <div class="small text-white opacity-75">{{bucketDialogContextLabel}}</div>
    </div>
    <button type="button" class="btn-close btn-close-white"
      i18n-aria-label aria-label="Close dialog" (click)="close()"></button>
  </div>
  <div class="modal-body">
    <ng-template #createBucketFields>
      <div class="border rounded p-3 bg-light">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
          <div>
            <div class="fw-semibold" i18n>Create a new bucket</div>
            <div class="small text-muted">
              <span i18n>You are creating a </span>
              <span class="fw-semibold">{{bucketKindLabel}}</span>.
            </div>
          </div>
          <span class="badge text-bg-secondary">{{bucketKindLabel}}</span>
        </div>

        <div class="row g-3">
          <div class="col-12">
            <label for="newBucketName" class="form-label fw-bold" i18n>Bucket name</label>
            <input type="text" class="form-control"
              id="newBucketName"
              [(ngModel)]="newBucketName"/>
          </div>

          <div class="col-12">
            <label for="newBucketDesc" class="form-label fw-bold" i18n>Description</label>
            <textarea rows="3" class="form-control"
              id="newBucketDesc"
              [(ngModel)]="newBucketDesc"></textarea>
          </div>

          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="newBucketPublic"
                [(ngModel)]="newBucketPublic">
              <label class="form-check-label fw-bold" for="newBucketPublic" i18n>Public bucket</label>
            </div>
            <div class="small text-muted mt-1" i18n>
              Public buckets can be discovered by other staff with access to public buckets.
            </div>
          </div>
        </div>
      </div>
    </ng-template>

    <ng-container *ngIf="showExistingBuckets; else createOnlyContent">
      <ul ngbNav #bucketDialogTabs="ngbNav" class="nav-tabs" [activeId]="activeTabId" [keyboard]="true" [roles]="false" role="tablist">
        <li role="presentation" [ngbNavItem]="1" [disabled]="!showExistingBuckets">
          <a role="tab" ngbNavLink i18n>Add to existing</a>
          <ng-template ngbNavContent>
            <div class="row mt-3 g-3 align-items-end">
              <div class="col-lg-8">
                <label class="form-label fw-bold" for="existing-bucket-name" i18n>Select an existing bucket</label>
                <eg-combobox [entries]="formatBucketEntries()"
                  (onChange)="bucketChanged($event)"
                  domId="existing-bucket-name">
                </eg-combobox>
              </div>
              <div class="col-lg-4">
                <button type="button" class="btn btn-info w-100" (click)="addToSelected()" i18n
                  [disabled]="!selectedBucket">
                  Add To Selected Bucket
                </button>
              </div>
            </div>
          </ng-template>
        </li>
        <li role="presentation" [ngbNavItem]="2">
          <a role="tab" ngbNavLink i18n>Create new</a>
          <ng-template ngbNavContent>
            <div class="mt-3">
              <ng-container *ngTemplateOutlet="createBucketFields"></ng-container>
            </div>
            <div class="mt-3 d-flex justify-content-end">
              <button type="button" class="btn btn-primary" (click)="addToNew()"
                [disabled]="!newBucketName">
                {{createButtonLabel}}
              </button>
            </div>
          </ng-template>
        </li>
        <li role="presentation" [ngbNavItem]="3" [disabled]="!showExistingBuckets">
          <a role="tab" ngbNavLink i18n>Use shared bucket</a>
          <ng-template ngbNavContent>
            <div class="row mt-3 g-3 align-items-end">
              <div class="col-lg-8">
                <label for="sharedBucketId" class="form-label fw-bold" i18n>ID of shared bucket</label>
                <input type="number" class="form-control" id="sharedBucketId"
                  [(ngModel)]="sharedBucketId"/>
              </div>
              <div class="col-lg-4">
                <button type="button" class="btn btn-info w-100" (click)="addToShared()" i18n
                  [disabled]="!sharedBucketId">
                  Add To Shared Bucket
                </button>
              </div>
            </div>
          </ng-template>
        </li>
      </ul>
      <div [ngbNavOutlet]="bucketDialogTabs"></div>
    </ng-container>

    <ng-template #createOnlyContent>
      <ng-container *ngTemplateOutlet="createBucketFields"></ng-container>
      <div class="mt-3 d-flex justify-content-end">
        <button type="button" class="btn btn-primary" (click)="addToNew()"
          [disabled]="!newBucketName">
          {{createButtonLabel}}
        </button>
      </div>
    </ng-template>
  </div>
</ng-template>

<eg-confirm-dialog #confirmAddToShared
  i18n-dialogTitle i18n-dialogBody
  dialogTitle="Confirm Add to Shared Bucket"
  dialogBody="Add to shared bucket named '{{sharedBucketName}}'?">
</eg-confirm-dialog>
